name: Test lumen Chart

on:
  pull_request:
    paths:
      - charts/lumen/**
      - charts/wandb-base/**
      - test-configs/lumen/**
      - .github/workflows/test-lumen.yaml

jobs:
  snapshots:
    name: Snapshot testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.20.1
      - name: Helm snapshot build and test
        run: |
          helm plugin install https://github.com/origranot/helm-cascade
          helm cascade build ./charts/lumen/
          helm plugin install https://github.com/jlandowner/helm-chartsnap
          ./snapshots.sh run lumen

  test:
    name: Test Chart
    strategy:
      fail-fast: false
      max-parallel: 9
      matrix:
        k8s-version: ["v1.36.1", "v1.35.5", "v1.34.8"]
        configuration:
          [
            "default",
            "gcp-workload-identity",
            "onprem",
          ]
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.k8s-version }}-${{ matrix.configuration }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.20.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: v3.12.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "::set-output name=changed::true"
          fi

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.32.0
          cluster_name: chart-testing-${{ matrix.k8s-version }}-${{ matrix.configuration }}
          node_image: kindest/node:${{ matrix.k8s-version }}
        if: env.ACT || steps.list-changed.outputs.changed == 'true'

      - name: Run chart-testing (install)
        if: env.ACT || steps.list-changed.outputs.changed == 'true'
        run: |
          ct install --namespace default \
          --charts ./charts/lumen \
          --config ct.yaml \
          --helm-extra-args '--kube-context kind-chart-testing-${{ matrix.k8s-version }}-${{ matrix.configuration }} --timeout 600s' \
          --helm-extra-set-args '--values test-configs/lumen/${{ matrix.configuration }}.yaml'
