name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.20.1

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml

      - name: Generate per-chart changelogs
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
          for chart in $(ct list-changed --config ct.yaml); do
            chart_name=$(basename $chart)
            git-cliff --tag-pattern="$chart_name-*" --include-path="$chart/**/*" --output "$chart/CHANGELOG.md"
          done

      - name: Commit changelogs
        run: |
          git add charts/*/CHANGELOG.md
          git commit -m "docs: update chart changelogs [no ci]"
          git push

      - name: Install Helm Deps
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add stakater https://stakater.github.io/stakater-charts
          helm repo update

      - name: Build deps install script
        run: |
          chmod +x ./helm-dep-build.sh
          ./helm-dep-build.sh
        shell: bash

      - name: Run chart-releaser
        id: releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Install cosign
        if: steps.releaser.outputs.changed_charts != ''
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Login to GHCR
        if: steps.releaser.outputs.changed_charts != ''
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push and sign charts on OCI registry
        if: steps.releaser.outputs.changed_charts != ''
        shell: bash
        env:
          OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/helm-charts
        run: ./.github/scripts/push-and-sign-oci-charts.sh

      - name: Verify OCI chart signatures
        if: steps.releaser.outputs.changed_charts != ''
        shell: bash
        env:
          CERT_IDENTITY_REGEXP: ^https://github\.com/${{ github.repository }}/\.github/workflows/release\.yaml@refs/heads/main$
          CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: ./.github/scripts/verify-oci-signatures.sh

      - name: Verify public OCI chart access
        if: steps.releaser.outputs.changed_charts != ''
        shell: bash
        run: ./.github/scripts/verify-public-oci-access.sh
