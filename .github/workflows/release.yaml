name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.20.1

      - name: Install Helm Deps
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add stakater https://stakater.github.io/stakater-charts
          helm repo update

      - name: Build deps install script
        run: |
          chmod +x ./helm-dep-build.sh
          ./helm-dep-build.sh
        shell: bash

      - name: Run chart-releaser
        id: releaser
        uses: helm/chart-releaser-action@v1.5.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GHCR
        if: steps.releaser.outputs.changed_charts != ''
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Push charts to OCI registry
        if: steps.releaser.outputs.changed_charts != ''
        id: oci_push
        shell: bash
        env:
          OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/helm-charts
        run: |
          set -euo pipefail
          : > pushed-refs.txt
          pushed_count=0
          for tarball in .cr-release-packages/*.tgz; do
            [ -e "$tarball" ] || continue
            echo "Pushing $tarball to $OCI_REPO"
            push_output=$(helm push "$tarball" "$OCI_REPO" 2>&1)
            echo "$push_output"
            pushed=$(echo "$push_output" | awk '/^Pushed: /{print $2}')
            digest=$(echo "$push_output" | awk '/^Digest: /{print $2}')
            if [ -z "$pushed" ] || [ -z "$digest" ]; then
              echo "::error::failed to parse push output for $tarball"
              exit 1
            fi
            echo "${pushed}@${digest}" >> pushed-refs.txt
            pushed_count=$((pushed_count + 1))
          done
          if [ "$pushed_count" -eq 0 ]; then
            echo "::error::chart-releaser reported changed charts, but no OCI artifacts were found in .cr-release-packages/"
            exit 1
          fi
          echo "--- pushed refs ---"
          cat pushed-refs.txt

      - name: Install cosign
        if: steps.releaser.outputs.changed_charts != ''
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign published OCI charts
        if: steps.releaser.outputs.changed_charts != ''
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            echo "Signing $ref"
            cosign sign --yes "$ref"
          done < pushed-refs.txt
