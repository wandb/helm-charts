name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@0717577d45739eb3c851188b29f50ed6c0b2194e # v2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.20.1

      - name: Install Helm Deps
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add stakater https://stakater.github.io/stakater-charts
          helm repo update

      - name: Build deps install script
        run: |
          chmod +x ./helm-dep-build.sh
          ./helm-dep-build.sh
        shell: bash

      - name: Run chart-releaser
        id: releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Install cosign
        if: steps.releaser.outputs.changed_charts != ''
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GHCR
        if: steps.releaser.outputs.changed_charts != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push and sign charts on OCI registry
        if: steps.releaser.outputs.changed_charts != ''
        shell: bash
        env:
          OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/helm-charts
        run: ./.github/scripts/push-and-sign-oci-charts.sh

      - name: Verify OCI chart signatures
        if: steps.releaser.outputs.changed_charts != ''
        shell: bash
        env:
          CERT_IDENTITY_REGEXP: ^https://github\.com/${{ github.repository }}/\.github/workflows/release\.yaml@refs/heads/main$
          CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: ./.github/scripts/verify-oci-signatures.sh

      - name: Verify public OCI chart access
        if: steps.releaser.outputs.changed_charts != ''
        shell: bash
        run: ./.github/scripts/verify-public-oci-access.sh
