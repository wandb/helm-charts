name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.20.1

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml

      - name: Generate per-chart changelogs
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
          for chart in $(ct list-changed --config ct.yaml); do
            chart_name=$(basename $chart)
            git-cliff --tag-pattern="$chart_name-*" --include-path="$chart/**/*" --output "$chart/CHANGELOG.md"
          done

      - name: Commit changelogs
        run: |
          git add charts/*/CHANGELOG.md
          git commit -m "docs: update chart changelogs [no ci]"
          git push

      - name: Install Helm Deps
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add stakater https://stakater.github.io/stakater-charts
          helm repo update

      - name: Build deps install script
        run: |
          chmod +x ./helm-dep-build.sh
          ./helm-dep-build.sh
        shell: bash

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.5.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
