name: Pre-Release Charts

on:
  pull_request:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@0717577d45739eb3c851188b29f50ed6c0b2194e # v2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.20.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: v3.11.0

      - name: yq - portable yaml processor
        uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3
        with:
          cmd: ""

      - name: Install Helm Deps
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add stakater https://stakater.github.io/stakater-charts
          helm repo update

      - name: Build deps install script
        run: |
          chmod +x ./helm-dep-build.sh
          ./helm-dep-build.sh
        shell: bash

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          set -euo pipefail
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Package charts
        if: steps.list-changed.outputs.changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          set -euo pipefail
          git_hash=$(git rev-parse --short "$GITHUB_SHA")
          for chart in $(ct list-changed --config ct.yaml); do
            chart_version=$(helm show chart "$chart" | yq .version)
            helm package \
              --version="${chart_version}-PR${PR_NUMBER}-${git_hash}" \
              --destination .cr-release-packages \
              "$chart"
          done
        shell: bash

      - name: Run chart-releaser
        if: steps.list-changed.outputs.changed == 'true'
        # v1.6.0+ fails with skip_packaging; see helm/chart-releaser-action#171.
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_packaging: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
