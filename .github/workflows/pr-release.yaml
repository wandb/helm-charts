name: Pre-Release Charts

on:
  pull_request:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.20.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0
        with:
          version: v3.11.0

      - name: yq - portable yaml processor
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: ""

      - name: Install Helm Deps
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add stakater https://stakater.github.io/stakater-charts
          helm repo update

      - name: Build deps install script
        run: |
          chmod +x ./helm-dep-build.sh
          ./helm-dep-build.sh
        shell: bash

      - name: Package charts
        id: package
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          set -euo pipefail
          git_hash=$(git rev-parse --short "$GITHUB_SHA")
          changed=$(ct list-changed --config ct.yaml)
          if [ -z "$changed" ]; then
            echo "No changed charts detected; skipping package + release."
            echo "packaged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for chart in $changed; do
            helm package --version=$(helm show chart "${chart}" | yq .version)-PR${PR_NUMBER}-${git_hash} -d .cr-release-packages "${chart}"
          done
          echo "packaged=true" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Run chart-releaser
        if: steps.package.outputs.packaged == 'true'
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_packaging: true
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
