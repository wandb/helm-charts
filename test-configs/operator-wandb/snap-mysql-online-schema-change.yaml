global:
  repositoryPrefix: "us-docker.pkg.dev/wandb-production/public"
  imageRegistry: "us-docker.pkg.dev/wandb-production/public"
  bucket:
    provider: "s3"
    name: "minio:9000/bucket"
    region: "us-east-1"
    accessKey: "minio"
    secretKey: "testpassword"
  env:
    GLOBAL_ADMIN_API_KEY: "local-e6473d304d3487851f5e2501657d3d81f8420874"
    GORILLA_INSECURE_ALLOW_API_KEY_ADMIN_ACCESS: "true"
    BUCKET_PROXY: "true"
    GORILLA_GLUE_FILE_STORE_IS_PROXIED: "true"
    GORILLA_FILE_STORE_IS_PROXIED: "true"
  mysql:
    caCert:
      valueFrom:
        secretKeyRef:
          name: mysql-ca
          key: mysql-ca.pem
  api:
    enabled: true
  size: "testing"

mysqlOnlineSchemaChange:
  enabled: true
  migrationId: wb-12345-add-run-index
  attempt: 2
  mode: execute
  databaseSecret:
    name: mysql-online-schema-change
    hostKey: host
    portKey: port
    databaseKey: database
    userKey: user
    passwordKey: password
  image:
    digest: sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  nodeSelector:
    workload.wandb.ai/type: database-maintenance
  tolerations:
    - key: database-maintenance
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux

app:
  env:
    GORILLA_STORAGE_BUCKET: "s3://local-files"
    GORILLA_FILEMETA_ENABLED: "false"

mysql:
  install: false
