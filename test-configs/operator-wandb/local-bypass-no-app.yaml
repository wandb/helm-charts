global:
  repositoryPrefix: "us-docker.pkg.dev/wandb-production/public"
  imageRegistry: "us-docker.pkg.dev/wandb-production/public"
  bucket:
    provider: "s3"
    name: "minio:9000/bucket"
    region: "us-east-1"
    accessKey: "minio"
    secretKey: "testpassword"
  env:
    GLOBAL_ADMIN_API_KEY: "local-e6473d304d3487851f5e2501657d3d81f8420874"
    GORILLA_INSECURE_ALLOW_API_KEY_ADMIN_ACCESS: "true"
    BUCKET_PROXY: "true"
    GORILLA_GLUE_FILE_STORE_IS_PROXIED: "true"
    GORILLA_FILE_STORE_IS_PROXIED: "true"
  redis:
    password: "redis123"
  glue:
    enabled: true
  # As part of the migration away from using local, the `bypass` setting will
  # control whether the gorilla services will use the app service (and, thus, local)
  localService:
    bypass: true
  api:
    enabled: true
  executor:
    enabled: true
  size: "testing"
  email:
    smtp:
      host: "smtp.example.com"
      port: 587
      user: "noreply@example.com"
      password: "" # intentionally empty
  # Remove from PR, just for testing local deployment and validating the ldap config
  auth:
    ldap:
      enabled: true
      host: "ldap://ldap.example.com"
      baseDN: "dc=example,dc=com"
      bindDN: "cn=admin,dc=example,dc=com"
      bindPW: "testpassword"
      attributes: "email,group"
      groupAllowList: ""
      tls: false

app:
  install: false

executor:
  install: true

filemeta:
  install: true

frontend:
  install: true


internalSignerPreHook:
  image:
    tag: 0.78.0-rc.1771864722
    # this tag override may be removed once 0.78.0 is fully released

nginx:
  install: true
  additionalServices:
    bucket:
      host: "http://minio:9000"
      headers:
        Host: "minio:9000"

ingress:
  install: false
  create: false

mysql:
  install: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"

redis:
  install: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"

reloader:
  install: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"

anaconda2:
  install: true
