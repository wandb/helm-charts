global:
  repositoryPrefix: "us-docker.pkg.dev/wandb-production/public"
  imageRegistry: "us-docker.pkg.dev/wandb-production/public"
  glue:
    enabled: true
  # As part of the migration away from using local, the `bypass` setting will
  # control whether the gorilla services will use the app service (and, thus, local)
  localService:
    bypass: true
  api:
    enabled: true
  executor:
    enabled: true
  size: "testing"

api:
  install: true

app:
  install: false

executor:
  install: true

filestream:
  install: true

filemeta:
  install: true

flat-run-fields-updater:
  install: true

glue:
  install: true

frontend:
  install: true

history-updater:
  install: true

parquet:
  install: true

parquet-metadata-cache:
  install: true

anaconda2:
  install: true
