runDisabledJob: "false"

kind: Job
helmHook:
  enabled: true
  hook: "post-install,pre-upgrade"
serviceAccount:
  create: false
podDisruptionBudget:
  enabled: false

jobs:
  zero-fields:
    # 0 is meaningful for both and must render (not fall back to k8s defaults)
    backoffLimit: 0
    ttlSecondsAfterFinished: 0
    activeDeadlineSeconds: 300
    containers:
      main:
        image:
          repository: debian
          tag: 12-slim
        command: ["/bin/true"]
  templated-off:
    enabled: '{{ .Values.runDisabledJob }}'
    containers:
      main:
        image:
          repository: debian
          tag: 12-slim
        command: ["/bin/true"]
