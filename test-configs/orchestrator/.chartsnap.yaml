# Mask chart-generated random secrets (randAlphaNum) so snapshots stay stable.
dynamicFields:
  - apiVersion: v1
    kind: Secret
    name: chartsnap-encryption-key
    jsonPath:
      - /data/AES_256_KEY
  - apiVersion: v1
    kind: Secret
    name: chartsnap-auth-secret
    jsonPath:
      - /data/AUTH_SECRET
