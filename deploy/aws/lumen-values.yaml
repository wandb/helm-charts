global:
  cloudProvider: "aws"
  lumen:
    bucket: "gs://wandb-lumen"

lumen-processor:
  serviceAccount:
    # MUST match the WIF principal binding (see iam-lumen-gcp.tf).
    name: lumen
  cronJobs:
    processor:
      volumes:
        - name: gcp-ksa
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
                  audience: '{{ include "lumen.audience" . }}'
        - name: gcp-wif-config
          configMap:
            name: "{{ .Release.Name }}-gcp-wif"
      containers:
        collector:
          env:
            GOMEMLIMIT:
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
            GOMAXPROCS:
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
            GOOGLE_APPLICATION_CREDENTIALS: /var/secrets/gcp/credential-config.json
          volumeMounts:
            - name: gcp-ksa
              mountPath: /var/run/secrets/tokens/gcp-ksa
              readOnly: true
            - name: gcp-wif-config
              mountPath: /var/secrets/gcp
              readOnly: true

# Notebook intentionally left without WIF: its SA is `<release>-lumen-notebook`,
# which does NOT match the attribute_condition `assertion.sub == "...:lumen"`
# in iam-lumen-gcp.tf. Add a separate TF binding or unify the SAs before wiring.
lumen-notebook:
  containers:
    notebook:
      env:
        GOMEMLIMIT:
          valueFrom:
            resourceFieldRef:
              resource: limits.memory
        GOMAXPROCS:
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu
