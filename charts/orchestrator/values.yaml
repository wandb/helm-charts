global:
  fqdn: ""

  env: {}
  # env:
  #   MY_VAR: "my-value"
  #   MY_OTHER_VAR: "my-other-value"

  # Secret management (propagated to subcharts via global).
  # When empty, secrets are auto-generated by the chart.
  # To reference externally managed secrets (e.g. ExternalSecrets),
  # use valueFrom.
  secrets:
    authSecret: ""
    # authSecret:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-auth-secret"
    #       key: "AUTH_SECRET"
    encryptionKey: ""
    # encryptionKey:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-encryption-secret"
    #       key: "AES_256_KEY"
    # identity<->engine SyncUser RPC shared secret (AUTH_SYNC_SECRET). Wired to
    # identity + workspace-engine ONLY. Unlike authSecret/encryptionKey it is NOT
    # auto-generated: empty => the env var is omitted => user-mirror sync stays off
    # (fail-open). Must be the SAME value on both services; override in prod.
    authSyncSecret: ""
    # authSyncSecret:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-auth-sync-secret"
    #       key: "AUTH_SYNC_SECRET"

  authProviders:
    google:
      clientId: ""
      # clientId:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "google-oauth-secret"
      #       key: "client-id"
      clientSecret:
      # clientSecret:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "google-oauth-secret"
      #       key: "client-secret"
    okta:
      issuer: ""
      # issuer:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "issuer"
      clientId: ""
      # clientId:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "client-id"
      clientSecret:
      # clientSecret:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "client-secret"
    credentials:
      enabled: "auto"

  common:
    labels: {}
    annotations: {}

  postgresql:
    user: "orchestrator"
    # Password can be either a direct string value or a valueFrom reference
    password: "orchestrator"
    # Alternative: reference a secret for the password
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "postgresql-secret"
    #       key: "password"
    host: ""
    port: "5432"
    database: "orchestrator"

  # Identity service's better-auth database (ctrlplane_auth). AUTH_DATABASE_URL is
  # assembled from these. It's a separate DB on the main instance with its own user;
  # reference an ExternalSecret-materialized secret for the password via valueFrom.
  authDatabase:
    user: "auth"
    host: ""
    port: "5432"
    database: "ctrlplane_auth"
    password: ""
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "ctrlplane-auth-db"   # materialized by an ExternalSecret
    #       key: "password"

  # SpiceDB (authorization). Shared by the identity service (writes membership
  # grants over gRPC) and the workspace-engine (enforces them). The preshared key
  # lives in the spicedb namespace; reference an ExternalSecret-materialized secret
  # for the token via valueFrom.
  spicedb:
    addr: ""
    insecure: "true"
    token: ""
    # token:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "spicedb-config"   # materialized by an ExternalSecret
    #       key: "preshared_key"

  # JWT audience — identity stamps it on issued tokens (AUTH_JWT_AUDIENCE) and the
  # engine pins it for verification (AUTH_AUDIENCE). One value so they can't drift.
  jwt:
    audience: "workspace-engine"
    # Port the identity service listens on / serves JWKS. Drives the engine's
    # AUTH_JWKS_URL and the identity PORT env. (The identity container/service
    # ports are static values — keep them equal to this if you override it.)
    identityPort: 8081

  # Redis — used by identity + engine for cross-pod SpiceDB read-after-write
  # (REDIS_URL is assembled from these).
  redis:
    host: ""
    port: "6379"
    password: ""
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "redis-secret"
    #       key: "password"

  integrations:
    github:
      url: "https://github.com"
      bot:
        name: ""
        clientId: ""
        # clientId:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "client-id"
        appId: ""
        # appId:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "app-id"
        clientSecret: ""
        # clientSecret:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "client-secret"
        privateKey: ""
        # privateKey:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "private-key"
        webhookSecret: ""
        # webhookSecret:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "webhook-secret"

ingress:
  create: true
  class: ""
  labels: {}
  annotations: {}
  tls:
    enabled: false
    secretName: ""

otel:
  install: true

identity:
  image:
    repository: orchestrator/identity
    tag: latest

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    AUTH_URL: "{{ .Values.global.fqdn }}"
    PORT: "{{ .Values.global.jwt.identityPort }}"
    # Engine Connect API for tRPC engine calls.
    CONNECT_URL: "http://{{ .Release.Name }}-workspace-engine:8086"
    # Audience stamped on issued JWTs; the engine pins the same value (AUTH_AUDIENCE).
    AUTH_JWT_AUDIENCE: "{{ .Values.global.jwt.audience }}"
    # OTel (identity uses OTLP/HTTP). OTEL_EXPORTER_OTLP_ENDPOINT is wired
    # node-local via the telemetry envTpl below. Service name + sampler ratio are
    # plain overrideable defaults.
    OTEL_SERVICE_NAME: "ctrlplane/identity"
    OTEL_SAMPLER_RATIO: "0.1"

  envTpls:
    - '{{ include "orchestrator.authProviderEnvVars" . }}'
    - '{{ include "orchestrator.authSyncSecretEnvVars" . }}'
    - '{{ include "orchestrator.authDatabaseEnvVars" . }}'
    - '{{ include "orchestrator.spicedbEnvVars" . }}'
    - '{{ include "orchestrator.redisEnvVars" . }}'
    - '{{ include "orchestrator.identityTelemetryEnvVars" . }}'

  containers:
    identity:
      ports:
        - name: http
          containerPort: 8081
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      livenessProbe:
        httpGet:
          path: /api/healthz
          port: http
      readinessProbe:
        httpGet:
          path: /api/healthz
          port: http
      startupProbe:
        httpGet:
          path: /api/healthz
          port: http

  service:
    enabled: true
    ports:
      - port: 8081
        targetPort: http
        protocol: TCP
        name: http

web:
  install: true

  image:
    repository: orchestrator/web
    tag: latest

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    AUTH_URL: "{{ .Values.global.fqdn }}"

  containers:
    web:
      ports:
        - name: http
          containerPort: 3000
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 4Gi

  service:
    enabled: true
    ports:
      - port: 3000
        targetPort: http
        protocol: TCP
        name: http

  autoscaling:
    horizontal:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

workspace-engine:
  install: true

  image:
    repository: orchestrator/workspace-engine
    tag: latest

  helmHook:
    enabled: true
    hook: "pre-install,pre-upgrade"
    hookWeight: "-5"
    hookDeletePolicy: "before-hook-creation,hook-succeeded"

  jobs:
    migrate:
      backoffLimit: 3
      ttlSecondsAfterFinished: 300
      containers:
        migrate:
          command: ["./engine", "migrate", "up"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

  service:
    enabled: true
    healthCheck:
      type: HTTP
      requestPath: /readyz
      port: 8089
    ports:
      - port: 8086
        targetPort: http
        protocol: TCP
        name: http

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    GITHUB_URL: "{{ .Values.global.integrations.github.url }}"
    # Datadog unified service tagging (Go/airframe). DD_SERVICE -> service.name,
    # DD_ENV -> deployment.environment, TRACE_SAMPLE_RATE -> app-side trace sampling
    # (the collector does not sample). All overrideable per environment. DD_ENV
    # defaults to "local"; deployments override it (e.g. "qa"). DD_VERSION is left
    # unset so the binary's build-stamped version.Version is used unless a
    # deployment passes a concrete build tag. TRACE_ADDRESS / METRICS_ADDRESS are
    # wired node-local via the telemetry envTpl below.
    DD_SERVICE: "ctrlplane/workspace-engine"
    DD_ENV: "local"
    TRACE_SAMPLE_RATE: "0.1"

    GRPC_PORT: "8086"
    HTTP_PREFIX_PATH: "/engine"

    AUTH_ALLOW_UNVERIFIED_JWT_CLAIMS: "false"
    AUTHZ_ALLOW_DISABLED: "false"

    SERVICES: ""

  envTpls:
    - '{{ include "orchestrator.githubBotEnvVars" . }}'
    - '{{ include "orchestrator.postgresqlEnvVars" . }}'
    - '{{ include "orchestrator.encryptionKeyEnvVars" . }}'
    - '{{ include "orchestrator.spicedbEnvVars" . }}'
    - '{{ include "orchestrator.authJwtEnvVars" . }}'
    - '{{ include "orchestrator.redisEnvVars" . }}'
    - '{{ include "orchestrator.authSyncSecretEnvVars" . }}'
    - '{{ include "orchestrator.workspaceEngineTelemetryEnvVars" . }}'

  containers:
    workspace-engine:
      ports:
        - name: http
          containerPort: 8086
        - name: health
          containerPort: 8089
      resources:
        requests:
          cpu: 8
          memory: 16Gi
        limits:
          cpu: 32
          memory: 64Gi
      livenessProbe:
        httpGet:
          path: /livez
          port: health
      readinessProbe:
        httpGet:
          path: /readyz
          port: health
      startupProbe:
        httpGet:
          path: /readyz
          port: health
