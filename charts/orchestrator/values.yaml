global:
  fqdn: ""

  env: {}
  # env:
  #   MY_VAR: "my-value"
  #   MY_OTHER_VAR: "my-other-value"

  # Secret management (propagated to subcharts via global).
  # When empty, secrets are auto-generated by the chart.
  # To reference externally managed secrets (e.g. ExternalSecrets),
  # use valueFrom.
  secrets:
    authSecret: ""
    # authSecret:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-auth-secret"
    #       key: "AUTH_SECRET"
    encryptionKey: ""
    # encryptionKey:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-encryption-secret"
    #       key: "AES_256_KEY"

  authProviders:
    google:
      clientId: ""
      # clientId:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "google-oauth-secret"
      #       key: "client-id"
      clientSecret:
      # clientSecret:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "google-oauth-secret"
      #       key: "client-secret"
    okta:
      issuer: ""
      # issuer:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "issuer"
      clientId: ""
      # clientId:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "client-id"
      clientSecret:
      # clientSecret:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "client-secret"
    credentials:
      enabled: "auto"

  common:
    labels: {}
    annotations: {}

  postgresql:
    user: "orchestrator"
    # Password can be either a direct string value or a valueFrom reference
    password: "orchestrator"
    # Alternative: reference a secret for the password
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "postgresql-secret"
    #       key: "password"
    host: ""
    port: "5432"
    database: "orchestrator"

  integrations:
    github:
      url: "https://github.com"
      bot:
        name: ""
        clientId: ""
        # clientId:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "client-id"
        appId: ""
        # appId:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "app-id"
        clientSecret: ""
        # clientSecret:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "client-secret"
        privateKey: ""
        # privateKey:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "private-key"
        webhookSecret: ""
        # webhookSecret:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "webhook-secret"

migrations:
  install: true

ingress:
  create: true
  class: ""
  labels: {}
  annotations: {}
  tls:
    enabled: false
    secretName: ""  # defaults to <fullname>-tls when empty

otel:
  install: true

api:
  install: true

  image:
    repository: orchestrator/api
    tag: latest

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    AUTH_URL: "{{ .Values.global.fqdn }}"
    GITHUB_URL: "{{ .Values.global.integrations.github.url }}"
    WORKSPACE_ENGINE_URL: "http://{{ .Release.Name }}-workspace-engine:8081"

  envTpls:
    - '{{ include "orchestrator.githubBotEnvVars" . }}'
    - '{{ include "orchestrator.postgresqlEnvVars" . }}'
    - '{{ include "orchestrator.authProviderEnvVars" . }}'

  containers:
    api:
      ports:
        - name: http
          containerPort: 8081
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 4Gi
      livenessProbe:
        httpGet:
          path: /api/healthz
          port: http
      readinessProbe:
        httpGet:
          path: /api/healthz
          port: http
      startupProbe:
        httpGet:
          path: /api/healthz
          port: http

  service:
    enabled: true
    ports:
      - port: 8081
        targetPort: http
        protocol: TCP
        name: http

web:
  install: true

  image:
    repository: orchestrator/web
    tag: latest

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    AUTH_URL: "{{ .Values.global.fqdn }}"

  envTpls:
    - '{{ include "orchestrator.authSecretEnvVars" . }}'

  containers:
    web:
      ports:
        - name: http
          containerPort: 3000
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 4Gi

  service:
    enabled: true
    ports:
      - port: 3000
        targetPort: http
        protocol: TCP
        name: http

  autoscaling:
    horizontal:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

workspace-engine:
  install: true

  image:
    repository: orchestrator/workspace-engine
    tag: latest

  service:
    enabled: true
    ports:
      - port: 8081
        targetPort: http
        protocol: TCP
        name: http
      - port: 6060
        targetPort: pprof
        protocol: TCP
        name: pprof

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    GITHUB_URL: "{{ .Values.global.integrations.github.url }}"

  envTpls:
    - '{{ include "orchestrator.githubBotEnvVars" . }}'
    - '{{ include "orchestrator.postgresqlEnvVars" . }}'
    - '{{ include "orchestrator.encryptionKeyEnvVars" . }}'

  containers:
    workspace-engine:
      ports:
        - name: http
          containerPort: 8081
        - name: pprof
          containerPort: 6060
      resources:
        requests:
          cpu: 8
          memory: 16Gi
        limits:
          cpu: 32
          memory: 64Gi
