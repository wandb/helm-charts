global:
  fqdn: ""

  env: {}
  # env:
  #   MY_VAR: "my-value"
  #   MY_OTHER_VAR: "my-other-value"

  # Secret management (propagated to subcharts via global).
  # When empty, secrets are auto-generated by the chart.
  # To reference externally managed secrets (e.g. ExternalSecrets),
  # use valueFrom.
  secrets:
    authSecret: ""
    # authSecret:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-auth-secret"
    #       key: "AUTH_SECRET"
    encryptionKey: ""
    # encryptionKey:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-encryption-secret"
    #       key: "AES_256_KEY"
    # identity<->engine SyncUser RPC shared secret (AUTH_SYNC_SECRET). Wired to
    # identity + workspace-engine ONLY. Unlike authSecret/encryptionKey it is NOT
    # auto-generated: empty => the env var is omitted => user-mirror sync stays off
    # (fail-open). Must be the SAME value on both services; override in prod.
    authSyncSecret: ""
    # authSyncSecret:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "my-auth-sync-secret"
    #       key: "AUTH_SYNC_SECRET"

  authProviders:
    google:
      clientId: ""
      # clientId:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "google-oauth-secret"
      #       key: "client-id"
      clientSecret:
      # clientSecret:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "google-oauth-secret"
      #       key: "client-secret"
    okta:
      issuer: ""
      # issuer:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "issuer"
      clientId: ""
      # clientId:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "client-id"
      clientSecret:
      # clientSecret:
      #   valueFrom:
      #     secretKeyRef:
      #       name: "okta-oauth-secret"
      #       key: "client-secret"
    credentials:
      enabled: "auto"

  common:
    labels: {}
    annotations: {}

  postgresql:
    user: "orchestrator"
    # Password can be either a direct string value or a valueFrom reference
    password: "orchestrator"
    # Alternative: reference a secret for the password
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "postgresql-secret"
    #       key: "password"
    host: ""
    port: "5432"
    database: "orchestrator"

  # Identity service's better-auth database (ctrlplane_auth). AUTH_DATABASE_URL is
  # assembled from these. It's a separate DB on the main instance with its own user;
  # reference an ExternalSecret-materialized secret for the password via valueFrom.
  authDatabase:
    user: "auth"
    host: ""            # the main instance host (same Cloud SQL instance)
    port: "5432"
    database: "ctrlplane_auth"
    password: ""
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "ctrlplane-auth-db"   # materialized by an ExternalSecret
    #       key: "password"

  # SpiceDB (authorization). Shared by the identity service (writes membership
  # grants over gRPC) and the workspace-engine (enforces them). The preshared key
  # lives in the spicedb namespace; reference an ExternalSecret-materialized secret
  # for the token via valueFrom.
  spicedb:
    addr: ""            # e.g. ctrlplane.spicedb:50051 (svc.namespace:port)
    insecure: "true"    # plaintext gRPC in-cluster; "false" for TLS
    token: ""
    # token:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "spicedb-config"   # materialized by an ExternalSecret
    #       key: "preshared_key"

  # JWT audience — identity stamps it on issued tokens (AUTH_JWT_AUDIENCE) and the
  # engine pins it for verification (AUTH_AUDIENCE). One value so they can't drift.
  jwt:
    audience: "workspace-engine"
    # Port the identity service listens on / serves JWKS. Drives the engine's
    # AUTH_JWKS_URL and the identity PORT env. (The identity container/service
    # ports are static values — keep them equal to this if you override it.)
    identityPort: 8081

  # Redis — used by identity + engine for cross-pod SpiceDB read-after-write
  # (REDIS_URL is assembled from these).
  redis:
    host: ""
    port: "6379"
    password: ""
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: "redis-secret"
    #       key: "password"

  integrations:
    github:
      url: "https://github.com"
      bot:
        name: ""
        clientId: ""
        # clientId:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "client-id"
        appId: ""
        # appId:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "app-id"
        clientSecret: ""
        # clientSecret:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "client-secret"
        privateKey: ""
        # privateKey:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "private-key"
        webhookSecret: ""
        # webhookSecret:
        #   valueFrom:
        #     secretKeyRef:
        #       name: "github-bot-secret"
        #       key: "webhook-secret"

ingress:
  create: true
  class: ""
  labels: {}
  annotations: {}
  tls:
    enabled: false
    secretName: ""  # defaults to <fullname>-tls when empty

otel:
  install: true

identity:
  image:
    repository: orchestrator/identity
    tag: latest

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    AUTH_URL: "{{ .Values.global.fqdn }}"
    PORT: "{{ .Values.global.jwt.identityPort }}"
    # Engine Connect API for tRPC engine calls.
    CONNECT_URL: "http://{{ .Release.Name }}-workspace-engine:8086"
    # Audience stamped on issued JWTs; the engine pins the same value (AUTH_AUDIENCE).
    AUTH_JWT_AUDIENCE: "{{ .Values.global.jwt.audience }}"

  envTpls:
    - '{{ include "orchestrator.authProviderEnvVars" . }}'
    - '{{ include "orchestrator.authSyncSecretEnvVars" . }}'
    - '{{ include "orchestrator.authDatabaseEnvVars" . }}'
    - '{{ include "orchestrator.spicedbEnvVars" . }}'
    - '{{ include "orchestrator.redisEnvVars" . }}'

  containers:
    identity:
      ports:
        - name: http
          containerPort: 8081
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      livenessProbe:
        httpGet:
          path: /api/healthz
          port: http
      readinessProbe:
        httpGet:
          path: /api/healthz
          port: http
      startupProbe:
        httpGet:
          path: /api/healthz
          port: http

  service:
    enabled: true
    ports:
      - port: 8081
        targetPort: http
        protocol: TCP
        name: http

web:
  install: true

  image:
    repository: orchestrator/web
    tag: latest

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    AUTH_URL: "{{ .Values.global.fqdn }}"

  containers:
    web:
      ports:
        - name: http
          containerPort: 3000
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 4Gi

  service:
    enabled: true
    ports:
      - port: 3000
        targetPort: http
        protocol: TCP
        name: http

  autoscaling:
    horizontal:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

workspace-engine:
  install: true

  image:
    repository: orchestrator/workspace-engine
    tag: latest

  service:
    enabled: true
    ports:
      - port: 8086
        targetPort: http
        protocol: TCP
        name: http
      - port: 6060
        targetPort: pprof
        protocol: TCP
        name: pprof

  env:
    BASE_URL: "{{ .Values.global.fqdn }}"
    GITHUB_URL: "{{ .Values.global.integrations.github.url }}"

    GRPC_PORT: "8086"
    HTTP_PREFIX_PATH: "/engine"

    AUTH_ALLOW_UNVERIFIED_JWT_CLAIMS: "false"
    AUTHZ_ALLOW_DISABLED: "false"

    SERVICES: ""

    TRACE_ADDRESS: "{{ .Release.Name }}-otel:4317"

  envTpls:
    - '{{ include "orchestrator.githubBotEnvVars" . }}'
    - '{{ include "orchestrator.postgresqlEnvVars" . }}'
    - '{{ include "orchestrator.encryptionKeyEnvVars" . }}'
    - '{{ include "orchestrator.spicedbEnvVars" . }}'
    - '{{ include "orchestrator.authJwtEnvVars" . }}'
    - '{{ include "orchestrator.redisEnvVars" . }}'
    - '{{ include "orchestrator.authSyncSecretEnvVars" . }}'

  containers:
    workspace-engine:
      ports:
        - name: http
          containerPort: 8086
        - name: pprof
          containerPort: 6060
        - name: health
          containerPort: 8089
      resources:
        requests:
          cpu: 8
          memory: 16Gi
        limits:
          cpu: 32
          memory: 64Gi
      livenessProbe:
        httpGet:
          path: /livez
          port: health
      readinessProbe:
        httpGet:
          path: /readyz
          port: health
      startupProbe:
        httpGet:
          path: /readyz
          port: health
