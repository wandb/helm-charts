suite: conditional install
templates:
  - charts/api/templates/deployment.yaml
  - charts/web/templates/deployment.yaml
  - charts/workspace-engine/templates/deployment.yaml
  - charts/migrations/templates/job.yaml
release:
  name: orchestrator

tests:
  - it: renders api deployment when api.install is true
    template: charts/api/templates/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Deployment

  - it: renders web deployment when web.install is true
    template: charts/web/templates/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Deployment

  - it: renders workspace-engine deployment when install is true
    template: charts/workspace-engine/templates/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Deployment

  - it: renders migrations job when migrations.install is true
    template: charts/migrations/templates/job.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Job
