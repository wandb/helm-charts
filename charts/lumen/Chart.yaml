apiVersion: v2
name: lumen
description: A Helm chart for deploying the W&B Lumen processor, notebook, and UI
type: application
version: 0.3.0
appVersion: 1.0.0

maintainers:
  - name: wandb
    email: support@wandb.com
    url: https://wandb.com

dependencies:
  - name: wandb-base
    alias: processor
    version: "0.12.4"
    repository: file://../wandb-base
  - name: wandb-base
    alias: notebook
    version: "0.12.4"
    repository: file://../wandb-base
  - name: wandb-base
    alias: ui
    version: "0.12.4"
    repository: file://../wandb-base
    condition: ui.enabled
