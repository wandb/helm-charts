global:
  repositoryPrefix: ""
  lumen:
    dataRoot: ""
    # Terraform-provided per cluster aws-eks / azure-aks / google-gke.
    # It can be empty for GCP-direct deployments, where no WIF is rendered.
    gcpWorkloadIdentity:
      audience: ""

# Processor: hourly CronJob that moves agent exports to inbound, processes,
# and writes parquet to the data root.
processor:
  kind: CronJob
  image:
    repository: us-docker.pkg.dev/wandb-production/public/wandb/lumen
    tag: v0.1.5
  serviceAccount:
    annotations: {}
  globalOptOut:
    volumes: true
  podDisruptionBudget:
    enabled: false
  service:
    enabled: false
  cronJobs:
    processor:
      enabled: true
      schedule: "15 * * * *"
      concurrencyPolicy: "Forbid"
      failedJobsHistoryLimit: 3
      restartPolicy: "OnFailure"
      backoffLimit: 5
      successfulJobsHistoryLimit: 5
      startingDeadlineSeconds: 300
      volumesTpls:
        - '{{ include "wandb.lumenStagingVolume" . }}'
      containers:
        collector:
          command: ["/app/entrypoint.sh", "processor"]
          args: []
          env:
            GOMEMLIMIT:
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
            GOMAXPROCS:
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
          envFrom:
            "{{ .Release.Name }}-configmap": "configMapRef"
          volumeMountsTpls:
            - '{{ include "wandb.lumenStagingVolumeMount" . }}'
          resources:
            requests:
              cpu: 8
              memory: 12Gi
            limits:
              cpu: 12
              memory: 24Gi

# Notebook: marimo UI for browsing the parquet data root.
notebook:
  kind: Deployment
  replicaCount: 1
  image:
    repository: us-docker.pkg.dev/wandb-production/public/wandb/lumen
    tag: v0.1.5
  serviceAccount:
    annotations: {}
  globalOptOut:
    volumes: true
  podDisruptionBudget:
    enabled: false
  volumesTpls:
    - '{{ include "wandb.lumenStagingVolume" . }}'
  service:
    enabled: true
    ports:
      - port: 8080
        protocol: TCP
        name: marimo
  containers:
    notebook:
      command: ["/app/entrypoint.sh", "marimo"]
      args: []
      env:
        GOMEMLIMIT:
          valueFrom:
            resourceFieldRef:
              resource: limits.memory
        GOMAXPROCS:
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu
      envFrom:
        "{{ .Release.Name }}-configmap": "configMapRef"
        "{{ .Release.Name }}-marimo-configmap": "configMapRef"
      volumeMountsTpls:
        - '{{ include "wandb.lumenStagingVolumeMount" . }}'
      ports:
        - containerPort: 8080
          name: marimo
      resources:
        requests:
          cpu: 2
          memory: 12Gi
        limits:
          cpu: 8
          memory: 24Gi

# UI: read-only configuration explorer. Disabled until its identity, Secret
# Manager resources, hostname, and immutable image tags are configured.
ui:
  enabled: false
  kind: Deployment
  replicaCount: 2
  image:
    repository: us-docker.pkg.dev/wandb-production/public/wandb/lumen-ui
    # Required when enabled. Use the immutable Git SHA published by wandb/lumen.
    tag: ""
  serviceAccount:
    create: true
    automount: true
    annotations: {}
  globalOptOut:
    volumes: true
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 150
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
    maxUnavailable: 0
  service:
    enabled: true
    ports:
      - port: 3000
        targetPort: http
        protocol: TCP
        name: http
  config:
    # Defaults to <global.lumen.dataRoot>/ducklake when empty.
    ducklakeRoot: ""
    hostname: ""
    allowedEmailDomains:
      - wandb.com
      - coreweave.com
    github:
      clientId: ""
      redirectUri: ""
      allowedOrg: wandb
      allowedTeamSlug: engineering
  secretProviderClass:
    # The GKE managed Secret Manager add-on. Disable only in local chart tests.
    enabled: true
    sessionSecretResourceName: ""
    githubClientSecretResourceName: ""
  exposure:
    # Creates a GKE external Ingress with a managed certificate, HTTPS redirect,
    # and IAP-protected BackendConfig. The Service remains ClusterIP-only and
    # reaches pods through an ingress NEG, leaving no direct public bypass.
    enabled: false
    globalStaticIpName: ""
    iap:
      oauthSecretName: ""
      # A non-secret digest of the OAuth client secret. Updating it causes the
      # BackendConfig to reconcile when the referenced Secret is rotated.
      credentialRevision: ""
  volumes:
    - name: ducklake-reader
      emptyDir:
        sizeLimit: 1Gi
  volumesTpls:
    - '{{ include "wandb.lumenUISecretVolume" . }}'
  initContainers:
    fetch-reader:
      image:
        repository: us-docker.pkg.dev/wandb-production/public/wandb/lumen
        # Required when enabled and initially expected to match ui.image.tag.
        tag: ""
        pullPolicy: IfNotPresent
      command: ["/app/bin/processor"]
      args: ["ducklake", "fetch", "--state-dir", "/var/lib/lumen/ducklake-reader"]
      envFrom:
        "{{ .Release.Name }}-ui-configmap": configMapRef
      volumeMounts:
        - name: ducklake-reader
          mountPath: /var/lib/lumen/ducklake-reader
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 1
          memory: 1Gi
  containers:
    ui:
      envFrom:
        "{{ .Release.Name }}-ui-configmap": configMapRef
      ports:
        - containerPort: 3000
          name: http
      livenessProbe:
        httpGet:
          path: /api/v1/health
          port: http
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /api/v1/ready
          port: http
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      startupProbe:
        httpGet:
          path: /api/v1/ready
          port: http
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 60
      volumeMounts:
        - name: ducklake-reader
          mountPath: /var/lib/lumen/ducklake-reader
          readOnly: true
      volumeMountsTpls:
        - '{{ include "wandb.lumenUISecretVolumeMount" . }}'
      resources:
        requests:
          cpu: 1
          memory: 4Gi
          ephemeral-storage: 1Gi
        limits:
          cpu: 4
          memory: 12Gi
          ephemeral-storage: 10Gi
