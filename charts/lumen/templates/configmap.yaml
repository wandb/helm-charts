{{- $bucket := required "global.lumen.bucket is required" .Values.global.lumen.bucket -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-lumen-configmap
data:
  LUMEN_CONFIG_PATH: "/app/definitions/collector/managed-install.yaml"
  LUMEN_SNAPSHOT_PREFIX: "{{ .Values.global.lumen.snapshotPrefix | default "snapshot" }}"
  LUMEN_CUSTOMER_NAME: "{{ .Release.Name }}"
  LUMEN_DATA_ROOT: {{ $bucket | quote }}
  LUMEN_AGENT_EXPORT_ROOT: "agent/exports"
  LUMEN_PROCESSOR_INBOUND_ROOT: "processor/inbound"
  LUMEN_PROCESSOR_COMPLETED_ROOT: "processor/completed"
  LUMEN_PARQUET_ROOT: "parquet"
