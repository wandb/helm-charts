{{- $bucket := required "global.lumen.bucket is required" .Values.global.lumen.bucket -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-lumen-configmap
data:
  LUMEN_CONFIG_PATH: "/app/definitions/collector/managed-install.yaml"
  LUMEN_SNAPSHOT_PREFIX: "{{ .Values.global.lumen.snapshotPrefix | default "snapshot" }}"
  LUMEN_CUSTOMER_NAME: "{{ .Release.Name }}"
  LUMEN_DATA_ROOT: {{ $bucket | quote }}
  # Force every path under LUMEN_DATA_ROOT — the processor entrypoint always
  # passes --source/--inbound/--completed/--parquet-root, so an empty env
  # would override the binary's compile-time defaults (which include
  # s3://lumen-bucket) with "".
  LUMEN_AGENT_EXPORT_ROOT: "{{ $bucket }}/agent/exports"
  LUMEN_PROCESSOR_INBOUND_ROOT: "{{ $bucket }}/processor/inbound"
  LUMEN_PROCESSOR_COMPLETED_ROOT: "{{ $bucket }}/processor/completed"
  LUMEN_PARQUET_ROOT: "{{ $bucket }}/parquet"
