{{- if index .Values "mcp-server" "install" }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "wandb.fullname" . }}-test-mcp"
  labels:
    {{- include "wandb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: mcp-health
      image: busybox:1.36
      command: ['wget', '--spider', '-q']
      args: ['http://{{ .Release.Name }}-mcp-server:8080/health']
  restartPolicy: Never
{{- end }}
