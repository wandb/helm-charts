{{- if .Values.clickhouseMigrationJob.install }}
{{- $jobImage := .Values.clickhouseMigrationJob.image | default dict }}
{{- $apiImage := (index .Values "api" | default dict).image | default dict }}
{{- $repository := coalesce $jobImage.repository $apiImage.repository "wandb/megabinary" }}
{{- with .Values.global.repositoryPrefix }}
{{- $repository = printf "%s/%s" . $repository }}
{{- end }}
{{- $digest := coalesce $jobImage.digest $apiImage.digest }}
{{- $tag := coalesce $jobImage.tag $apiImage.tag "latest" }}
{{- $image := ternary (printf "%s@%s" $repository ($digest | toString)) (printf "%s:%s" $repository $tag) (not (empty $digest)) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-ch-migrate
  labels:
    app.kubernetes.io/name: ch-migrate
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "wandb.commonLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.clickhouseMigrationJob.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ch-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "wandb.podLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- include "wandb.nodeSelector" . | nindent 6 }}
      {{- include "wandb.tolerations" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-clickhouse
          image: "{{ $image }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - bash
            - -c
            - |
              wait_for() {
                until (exec 3<>"/dev/tcp/$1/$2") 2>/dev/null; do
                  echo "waiting for clickhouse at $1:$2"
                  sleep 5
                done
                echo "clickhouse reachable at $1:$2"
              }
              if [[ -n "$HISTORY_HOST" ]]; then
                wait_for "$HISTORY_HOST" "$HISTORY_PORT"
              fi
              if [[ -n "$REGISTRY_SEARCH_HOST" ]]; then
                wait_for "$REGISTRY_SEARCH_HOST" "$REGISTRY_SEARCH_PORT"
              fi
              if [[ -n "$RUN_STORE_ACCELERATOR_HOST" ]]; then
                wait_for "$RUN_STORE_ACCELERATOR_HOST" "$RUN_STORE_ACCELERATOR_PORT"
              fi
          env:
            {{- include "wandb.historyEnvs" . | nindent 12 }}
            {{- include "wandb.registrySearchEnvs" . | nindent 12 }}
            {{- include "wandb.runStoreAcceleratorEnvs" . | nindent 12 }}
      containers:
        - name: ch-migrate
          image: "{{ $image }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - bash
            - -c
            - |
              # No --db/--runs-db/--usage-db flags: without them the MySQL
              # schemas are skipped (their env vars are unset here) and only the
              # ClickHouse schemas run, keyed off the MIGRATE_*_DB env vars.
              # MySQL migrations remain with the migrate-db initContainers.
              LOG_FILE="/tmp/migrate.log"
              ./megabinary migrate 2>&1 | tee -a $LOG_FILE
              EXIT_CODE=${PIPESTATUS[0]}
              MIGRATION_FILE_MISSING_ERROR_CODE=101
              if [[ $EXIT_CODE -eq 0 || $EXIT_CODE -eq $MIGRATION_FILE_MISSING_ERROR_CODE ]]; then
                exit 0
              else
                # missing migration error log from golang-migrate@v4 -- older versions of megabinary
                if grep -q "no migration found for version" $LOG_FILE; then
                  exit 0
                fi
                exit $EXIT_CODE
              fi
          env:
            {{- include "wandb.sslCertEnvs" . | nindent 12 }}
            {{- include "wandb.historyEnvs" . | nindent 12 }}
            {{- include "wandb.registrySearchEnvs" . | nindent 12 }}
            {{- include "wandb.runStoreAcceleratorEnvs" . | nindent 12 }}
          volumeMounts:
            - name: temp-dir
              mountPath: /tmp/
      volumes:
        - name: temp-dir
          emptyDir: {}
{{- end }}
