{{- if index .Values "history-reader" "install" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-history-reader-configmap
  labels:
    {{- include "wandb.commonLabels" . | nindent 4 }}
data:
  GORILLA_FILE_HOST: {{ .Values.global.host | quote }}

  # gRPC server config (matches historyReaderConfig.GRPCPort and friends).
  # Numeric values are int-cast so they render as e.g. "4194304" instead of
  # "4.194304e+06" when helm round-trips large ints through YAML.
  GORILLA_HISTORY_READER_GRPC_PORT: "9244"
  GORILLA_HISTORY_READER_GRPC_MAX_RECV_MSG_SIZE: "{{ index .Values "history-reader" "grpc" "maxRecvMsgSize" | int }}"
  GORILLA_HISTORY_READER_GRPC_MAX_SEND_MSG_SIZE: "{{ index .Values "history-reader" "grpc" "maxSendMsgSize" | int }}"

  # In-memory metadata cache (historyReaderConfig.CacheSize / CacheTTL).
  GORILLA_HISTORY_READER_CACHE_SIZE: "{{ index .Values "history-reader" "cache" "size" | int }}"
  GORILLA_HISTORY_READER_CACHE_TTL: {{ index .Values "history-reader" "cache" "ttl" | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-history-reader-secret
  labels:
    {{- include "wandb.commonLabels" . | nindent 4 }}
data: {}
{{- end }}
